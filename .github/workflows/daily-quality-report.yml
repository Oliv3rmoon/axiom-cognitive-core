name: Daily Quality Report

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-quality-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout axiom-cognitive-core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: axiom-cognitive-core
          
      - name: Checkout axiom-workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/axiom-workspace
          path: axiom-workspace
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        working-directory: axiom-cognitive-core
        run: npm ci
        
      - name: Run quality monitoring script
        working-directory: axiom-cognitive-core
        run: node scripts/monitor-quality.js
        env:
          REPORT_OUTPUT_DIR: ../axiom-workspace/reports/conversation-quality
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Commit and push report
        working-directory: axiom-workspace
        run: |
          git config user.name "AXIOM Quality Monitor"
          git config user.email "axiom-bot@users.noreply.github.com"
          
          REPORT_DATE=$(date -u +%Y-%m-%d)
          REPORT_PATH="reports/conversation-quality/${REPORT_DATE}.md"
          
          git add "${REPORT_PATH}"
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "📊 Quality report for ${REPORT_DATE}

Automated daily quality metrics:
- Response time analysis
- Tool-use efficiency
- Conversation continuity metrics
- Pattern detection

Generated by daily-quality-report workflow"
          
          git push
          
      - name: Create issue on degradation
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: 'axiom-workspace',
              title: `⚠️ Quality Report Failed: ${date}`,
              body: `The daily quality monitoring workflow failed to complete.
              
**Date:** ${date}
**Workflow:** [View run](${context.payload.repository.html_url}/actions/runs/${context.runId})

This may indicate:
- Data collection issues
- Metric calculation errors
- Repository access problems

Please investigate the workflow logs.`,
              labels: ['quality-monitoring', 'automated']
            });